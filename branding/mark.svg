<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>goalkeeper</title>
  <desc>Goal-gate mark: three vertical posts topped by a single crossbar. Single signature color.</desc>
  <!-- Crossbar -->
  <rect x="8" y="14" width="48" height="6" rx="1" fill="#0E7C66"/>
  <!-- Left post -->
  <rect x="9" y="14" width="6" height="42" rx="1" fill="#0E7C66"/>
  <!-- Center post -->
  <rect x="29" y="14" width="6" height="42" rx="1" fill="#0E7C66"/>
  <!-- Right post -->
  <rect x="49" y="14" width="6" height="42" rx="1" fill="#0E7C66"/>
</svg>
